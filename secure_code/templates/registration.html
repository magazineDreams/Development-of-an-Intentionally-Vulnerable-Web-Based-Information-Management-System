<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — MMU Media</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <img src="{{ url_for('static', filename='assets/MMUMediaLogo.png') }}" alt="MMU Media Logo" width="100" height="50">
    </div>
    <nav class="nav-buttons">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('login') }}">Login</a>
    </nav>
  </header>

  <div class="login-wrap" style="max-width: 520px;">

    <!-- Header -->
    <div style="text-align: center; margin-bottom: 24px;">
      <div style="font-size: 2.4rem; color: var(--primary); margin-bottom: 10px;">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h2 style="font-size: 1.6rem; font-weight: 800; color: var(--ink); margin-bottom: 6px;">Create an Account</h2>
      <p style="color: var(--muted); font-size: 0.95rem;">Join the MMU Media student portal</p>
    </div>

    <div class="panel" style="padding: 32px 36px;">

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/registration">

        <!-- First + Last Name row -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
          <div class="form-group">
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" name="firstname" placeholder="John" required autofocus>
          </div>
          <div class="form-group">
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" name="lastname" placeholder="Doe" required>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div style="position: relative;">
            <i class="bi bi-envelope" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted);"></i>
            <input type="email" id="email" name="email" placeholder="you@mmu.ac.uk" required style="padding-left: 36px;">
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div style="position: relative;">
            <i class="bi bi-lock" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted);"></i>
            <input type="password" id="password" name="password" placeholder="Choose a password" required style="padding-left: 36px;">
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group" style="margin-bottom: 22px;">
          <label for="confirm_password">Confirm Password</label>
          <div style="position: relative;">
            <i class="bi bi-lock-fill" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted);"></i>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required style="padding-left: 36px;">
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="bi bi-person-check" style="margin-right: 6px;"></i>Create Account
        </button>

      </form>

      <hr style="border: none; border-top: 1px solid #e6edf3; margin: 24px 0;">

      <div class="register-link">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>

    </div>

    <p style="text-align: center; margin-top: 14px;">
      <a href="{{ url_for('index') }}" style="color: var(--muted); font-size: 0.88rem;">
        <i class="bi bi-arrow-left" style="margin-right: 4px;"></i>Back to home
      </a>
    </p>

  </div>

</body>
</html>
