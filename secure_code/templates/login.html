<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — MMU Media</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img src="{{ url_for('static', filename='assets/MMUMediaLogo.png') }}" alt="MMU Media Logo" width="100" height="50">
    </div>
    <nav class="nav-buttons">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('registration') }}">Register</a>
    </nav>
  </header>

  <div class="login-wrap">
    <div class="panel">
      <h2>Sign in</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@mmu.ac.uk" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn-submit">Login</button>
      </form>

      <div class="register-link">
        Don't have an account? <a href="/registration">Register</a>
      </div>
    </div>
  </div>

</body>
</html>
